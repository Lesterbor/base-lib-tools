<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
		<title>立创基础库 - 器件选择</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family:
					'Microsoft Yahei',
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					sans-serif;
			}

			body {
				background-color: #1a1a1a;
				overflow: hidden;
				margin: 0;
				padding: 0;
			}

			/* 主容器 - 左右布局 */
			.container {
				display: flex;
				flex-direction: row;
				height: 100vh;
				width: 100%;
				background: #1a1a1a;
				margin: 0;
				padding: 0;
				overflow: hidden;
			}

			/* 左侧主内容区 */
			.main-content {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
			}

			/* 右侧参数值侧边栏 */
			.value-sidebar {
				width: 120px;
				flex-shrink: 0;
				display: flex;
				flex-direction: column;
				background: #1a1a1a;
				height: 100%;
				overflow: hidden;
				padding-top: 2px;
				margin-right: 2px;
			}

			.value-sidebar .select-card {
				flex: 1;
				width: 100%;
				border-radius: 0;
				display: flex;
				flex-direction: column;
				overflow: hidden;
			}

			.value-sidebar .card-content {
				flex: 1;
				overflow-y: auto;
				overflow-x: hidden;
				background: #3a3a3a;
				min-height: 0;
			}

			/* ========= 上半部分：选择区域 ========= */
			.select-section {
				display: flex;
				flex-direction: row;
				flex-shrink: 0;
				gap: 2px;
				padding: 2px;
				background: #1a1a1a;
				height: 130px;
			}

			/* 两个卡片：横向排列 */
			.select-section .select-card {
				flex: 1;
				min-height: 80px;
				background: #3a3a3a;
				border-radius: 0px;
				display: flex;
				overflow: hidden;
			}

			/* 卡片内容区：去除左侧标题，增加内边距 */
			.card-content {
				flex: 1;
				overflow-y: auto;
				overflow-x: hidden;
				padding: 0px;
				background: #3a3a3a;
				min-height: 0;
			}

			/* 选项样式 - 增加高度 */
			.option-item {
				padding: 7px 9px;
				font-size: 11px;
				color: #d0d0d0;
				cursor: pointer;
				margin-bottom: 3px;
				border-radius: 0px;
				transition: all 0.12s ease;
				word-break: break-word;
				line-height: 1.2;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.option-item:last-child {
				margin-bottom: 0;
			}

			.option-item:hover {
				background: #4a4a4a;
				color: #fff;
				transform: translateX(2px);
			}

			.option-item.selected {
				background: linear-gradient(135deg, #409eff 0%, #3a8ee6 100%);
				color: #fff;
				box-shadow: 0 1px 4px rgba(64, 158, 255, 0.3);
				font-weight: 500;
			}

			/* 放置模式蒙版 */
			.placement-overlay {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.7);
				display: none;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				z-index: 1000;
				cursor: pointer;
			}

			.placement-overlay.active {
				display: flex;
			}

			.placement-overlay .overlay-content {
				background: #3a3a3a;
				border-radius: 8px;
				padding: 30px 40px;
				text-align: center;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
				cursor: default;
			}

			.placement-overlay .overlay-icon {
				font-size: 48px;
				margin-bottom: 15px;
			}

			.placement-overlay .overlay-text {
				font-size: 14px;
				color: #e6e6e6;
				margin-bottom: 15px;
			}

			.placement-overlay .overlay-subtext {
				font-size: 12px;
				color: #909090;
			}

			.placement-overlay .loading-spinner {
				width: 32px;
				height: 32px;
				border: 3px solid #4a4a4a;
				border-top-color: #409eff;
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				margin: 0 auto 15px;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			/* 放置按钮样式 - 极小化 */
			.place-btn {
				padding: 4px 9px;
				font-size: 10px;
				background: linear-gradient(135deg, #409eff 0%, #3a8ee6 100%);
				color: #fff;
				border: none;
				border-radius: 3px;
				cursor: pointer;
				transition: all 0.15s ease;
				box-shadow: 0 1px 3px rgba(64, 158, 255, 0.3);
				white-space: nowrap;
			}

			.place-btn:hover {
				background: linear-gradient(135deg, #5ab8ff 0%, #409eff 100%);
				box-shadow: 0 2px 5px rgba(64, 158, 255, 0.35);
			}

			.place-btn:active {
				transform: scale(0.98);
			}

			/* ========= 下半部分：结果展示区（最大化可用空间） ========= */
			.result-section {
				background: #3a3a3a;
				margin-right: 2px;
				flex: 1;
				display: flex;
				flex-direction: column;
				overflow: hidden;
				min-height: 0;
			}

			.result-container {
				background: #3a3a3a;
				display: flex;
				flex-direction: column;
				width: 100%;
				height: 100%;
			}

			.result-header {
				padding: 7px 9px;
				background: #2a2a2a;
				display: flex;
				justify-content: space-between;
				align-items: center;
				border-bottom: 1px solid #3e3e3e;
				flex-shrink: 0;
				position: sticky;
				top: 0;
				z-index: 10;
			}

			.result-header h3 {
				font-size: 12px;
				font-weight: 600;
				color: #d6d6d6;
				letter-spacing: 0.3px;
			}

			.result-header .count {
				font-size: 10px;
				color: #909090;
				background: #323232;
				padding: 2px 5px;
				border-radius: 10px;
			}

			/* 多条记录时橙红色提示 */
			.result-header .count.warning {
				color: #ff6b35;
				background: rgba(255, 107, 53, 0.15);
			}

			/* 卡片容器 */
			.cards-wrapper {
				position: relative;
				width: 100%;
				background: #3a3a3a;
				flex: 1;
				overflow-y: auto;
				padding: 6px;
				display: flex;
				flex-direction: column;
				gap: 5px;
			}

			/* 器件卡片样式 - 上下布局 */
			.component-card {
				background: #424242;
				border: 1px solid #4a4a4a;
				border-radius: 4px;
				padding: 8px;
				display: flex;
				flex-direction: column;
				gap: 6px;
				transition: all 0.15s ease;
				cursor: default;
			}

			.component-card:hover {
				background: #4a4a4a;
				border-color: #555;
			}

			/* 卡片上部：左右布局（信息 + 图片） */
			.card-body {
				display: flex;
				gap: 8px;
				width: 100%;
				flex: 1;
			}

			/* 卡片左侧：信息区域（型号 + 信息） */
			.card-left {
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 4px;
				min-width: 0;
			}

			/* 型号行 */
			.card-top {
				display: flex;
				justify-content: space-between;
				align-items: center;
				width: 100%;
			}

			.card-title {
				font-size: 13px;
				font-weight: 600;
				color: #e6e6e6;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				flex: 1;
			}

			/* 卡片内容 */
			.card-info {
				display: flex;
				flex-direction: column;
				gap: 3px;
				flex: 1;
			}

			.info-row {
				display: flex;
				justify-content: space-between;
				font-size: 11px;
			}

			.info-label {
				color: #8a94a2;
				min-width: 45px;
			}

			.info-value {
				color: #d2d6db;
				flex: 1;
				text-align: right;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				margin-left: 10px;
			}

			/* 卡片右侧：强制 1:1 正方形，不会变形 */
			.card-right {
				flex-shrink: 0;
				border-radius: 3px;
				background-color: #2a2a2aff; /* 可选，避免空白处过于突兀 */
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				position: relative;
				/* 核心：先固定宽度，再用 aspect-ratio 强制 1:1，高度自动等于宽度 */
				width: 90px;
				aspect-ratio: 1 / 1;
			}

			/* 产品图片：100% 填满容器，等比裁切，不变形 */
			.product-image {
				width: 100%;
				height: 100%;
				object-fit: contain;
				background-color: #2a2a2aff; /* 可选，避免空白处过于突兀 */
			}

			/* 卡片底部：放置按钮单独一行 */
			.card-footer {
				display: flex;
				justify-content: flex-end;
				padding-top: 4px;
				border-top: 1px solid #4a4a4a;
				margin-top: 2px;
			}

			/* 无图片提示 */
			.no-image {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				color: #6a6f79;
				text-align: center;
			}

			.no-image .icon {
				font-size: 24px;
				margin-bottom: 4px;
				opacity: 0.6;
			}

			.no-image-text {
				font-size: 9px;
				line-height: 1.2;
			}

			/* 空状态展示 - 紧凑居中 */
			.empty-wrapper {
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				background: #3a3a3a;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 150px;
				z-index: 2;
			}

			.empty-state {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				color: #7a7f89;
				background: #3a3a3a;
				padding: 15px 12px;
				border-radius: 8px;
				text-align: center;
			}

			.empty-state .icon {
				font-size: 32px;
				margin-bottom: 8px;
				opacity: 0.6;
			}

			.empty-state p {
				font-size: 10px;
				font-weight: 400;
				letter-spacing: 0.2px;
			}

			/* 自定义滚动条(极致紧凑) */
			::-webkit-scrollbar {
				width: 5px;
				height: 3px;
			}
			::-webkit-scrollbar-track {
				background: #3a3a3a;
			}
			::-webkit-scrollbar-thumb {
				background: #505050;
				border-radius: 2px;
			}
			::-webkit-scrollbar-thumb:hover {
				background: #606060;
			}
		</style>
	</head>
	<body>
		<!-- 放置模式蒙版 -->
		<div class="placement-overlay" id="placementOverlay">
			<div class="overlay-content">
				<div class="loading-spinner"></div>
				<div class="overlay-text" id="overlayText">正在获取器件信息...</div>
				<div class="overlay-subtext">请稍候</div>
			</div>
		</div>

		<div class="container">
			<!-- 左侧主内容区 -->
			<div class="main-content">
				<!-- 上半部分 选择区 -->
				<div class="select-section">
					<!-- 器件类型卡片 -->
					<div class="select-card">
						<div class="card-content" id="typeList"></div>
					</div>

					<!-- 封装选择卡片 -->
					<div class="select-card">
						<div class="card-content" id="packageList"></div>
					</div>
				</div>

				<!-- 下半部分 结果展示区 -->
				<div class="result-section">
					<div class="result-container">
						<div class="result-header">
							<h3></h3>
							<span class="count" id="resultCount">共 0 条记录</span>
						</div>
						<div class="cards-wrapper" id="cardsWrapper">
							<div class="empty-wrapper" id="emptyWrapper" style="display: flex">
								<div class="empty-state">
									<p>请选择器件类型、封装和参数值</p>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- 右侧参数值侧边栏 -->
			<div class="value-sidebar">
				<div class="select-card">
					<div class="card-content" id="valueList"></div>
				</div>
			</div>
		</div>

		<script>
			// ==================== IndexedDB 配置 ====================
			const DB_NAME = 'BaseLibDB';
			const DB_VERSION = 3;
			const STORE_NAME = 'components';
			const STORE_COMPONENT_TYPES = 'componentTypes';
			const STORE_PACKAGE_TYPES = 'packageTypes';
			const STORE_RESISTOR_VALUES = 'resistorValues';
			const STORE_CAPACITOR_VALUES = 'capacitorValues';
			const IFRAME_ID = 'BaseLib';

			let db = null;

			// 打开数据库
			function openDB() {
				return new Promise((resolve, reject) => {
					const request = indexedDB.open(DB_NAME, DB_VERSION);
					request.onerror = () => reject(request.error);
					request.onsuccess = () => resolve(request.result);
					request.onupgradeneeded = (event) => {
						const database = event.target.result;
						if (!database.objectStoreNames.contains(STORE_NAME)) {
							const store = database.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
							store.createIndex('type', 'type', { unique: false });
							store.createIndex('pkg', 'pkg', { unique: false });
							store.createIndex('value', 'value', { unique: false });
							store.createIndex('manufacturer', 'manufacturer', { unique: false });
							store.createIndex('model', 'model', { unique: false });
						}
						if (!database.objectStoreNames.contains(STORE_COMPONENT_TYPES)) {
							const store = database.createObjectStore(STORE_COMPONENT_TYPES, { keyPath: 'id', autoIncrement: true });
							store.createIndex('name', 'name', { unique: true });
							store.createIndex('code', 'code', { unique: true });
						}
						if (!database.objectStoreNames.contains(STORE_PACKAGE_TYPES)) {
							const store = database.createObjectStore(STORE_PACKAGE_TYPES, { keyPath: 'id', autoIncrement: true });
							store.createIndex('name', 'name', { unique: true });
							store.createIndex('code', 'code', { unique: true });
						}
						if (!database.objectStoreNames.contains(STORE_RESISTOR_VALUES)) {
							const store = database.createObjectStore(STORE_RESISTOR_VALUES, { keyPath: 'id', autoIncrement: true });
							store.createIndex('value', 'value', { unique: true });
							store.createIndex('unit', 'unit', { unique: false });
						}
						if (!database.objectStoreNames.contains(STORE_CAPACITOR_VALUES)) {
							const store = database.createObjectStore(STORE_CAPACITOR_VALUES, { keyPath: 'id', autoIncrement: true });
							store.createIndex('value', 'value', { unique: true });
							store.createIndex('unit', 'unit', { unique: false });
						}
					};
				});
			}

			// 获取指定表的所有数据
			function getAllFromStore(storeName) {
				return new Promise((resolve, reject) => {
					if (!db) {
						reject(new Error('数据库未连接'));
						return;
					}
					const tx = db.transaction(storeName, 'readonly');
					const store = tx.objectStore(storeName);
					const request = store.getAll();
					request.onsuccess = () => resolve(request.result);
					request.onerror = () => reject(request.error);
				});
			}

			// 根据条件查询元件数据
			function getComponentsByFilters(typeId, pkgId, valueId) {
				return new Promise((resolve, reject) => {
					if (!db) {
						reject(new Error('数据库未连接'));
						return;
					}
					const tx = db.transaction(STORE_NAME, 'readonly');
					const store = tx.objectStore(STORE_NAME);
					const request = store.getAll();
					request.onsuccess = () => {
						const allComponents = request.result;
						// 过滤符合条件的元件
						const filtered = allComponents.filter((item) => {
							return item.type === typeId && item.pkg === pkgId && item.value === valueId;
						});
						resolve(filtered);
					};
					request.onerror = () => reject(request.error);
				});
			}

			// DOM 元素
			const typeListEl = document.getElementById('typeList');
			const packageListEl = document.getElementById('packageList');
			const valueListEl = document.getElementById('valueList');
			const cardsWrapper = document.getElementById('cardsWrapper');
			const resultCountSpan = document.getElementById('resultCount');
			const emptyWrapper = document.getElementById('emptyWrapper');

			// 当前选中的状态（存储 ID）
			let selectedTypeId = null; // 器件类型 ID
			let selectedTypeCode = ''; // 器件类型代码 (resistor/capacitor)
			let selectedPkgId = null; // 封装 ID
			let selectedValueId = null; // 值 ID

			// ---------- 辅助函数: 清空高亮 ----------
			function clearHighlights(container) {
				if (!container) return;
				const items = container.querySelectorAll('.option-item');
				items.forEach((item) => item.classList.remove('selected'));
			}

			// 简单防XSS
			function escapeHtml(str) {
				if (!str) return '';
				return str
					.replace(/[&<>]/g, function (m) {
						if (m === '&') return '&amp;';
						if (m === '<') return '&lt;';
						if (m === '>') return '&gt;';
						return m;
					})
					.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
						return c;
					});
			}

			// 初始化：加载器件类型列表
			async function initComponentTypes() {
				try {
					db = await openDB();
					const componentTypes = await getAllFromStore(STORE_COMPONENT_TYPES);

					typeListEl.innerHTML = '';
					if (componentTypes.length === 0) {
						const emptyMsg = document.createElement('div');
						emptyMsg.className = 'option-item';
						emptyMsg.style.cssText = 'color:#6c6f78; cursor:default;';
						emptyMsg.textContent = '暂无数据，请先更新数据库';
						typeListEl.appendChild(emptyMsg);
						return;
					}

					// 渲染器件类型选项
					componentTypes.forEach((type) => {
						const div = document.createElement('div');
						div.className = 'option-item';
						div.dataset.id = type.id;
						div.dataset.code = type.code;
						div.textContent = type.name;
						typeListEl.appendChild(div);
					});
				} catch (error) {
					console.error('加载器件类型失败:', error);
				}
			}

			// 加载封装列表
			async function loadPackages() {
				try {
					const packages = await getAllFromStore(STORE_PACKAGE_TYPES);

					packageListEl.innerHTML = '';
					if (packages.length === 0) {
						const emptyMsg = document.createElement('div');
						emptyMsg.className = 'option-item';
						emptyMsg.style.cssText = 'color:#6c6f78; cursor:default;';
						emptyMsg.textContent = '暂无封装数据';
						packageListEl.appendChild(emptyMsg);
						return;
					}

					// 渲染封装选项
					packages.forEach((pkg) => {
						const div = document.createElement('div');
						div.className = 'option-item';
						div.dataset.id = pkg.id;
						div.textContent = pkg.name;
						packageListEl.appendChild(div);
					});
				} catch (error) {
					console.error('加载封装列表失败:', error);
				}
			}

			// 将阻值/容值转换为统一的基本单位（Ω 或 F）用于比较
			function convertToBaseUnit(value, unit) {
				// value 格式如: "4.7k", "100", "10m" 等
				// unit 格式如: "Ω", "F" 等

				// 提取数值部分和前缀
				const match = value.match(/^([\d.]+)([a-zA-Zμ]*)$/);
				if (!match) return 0;

				const numValue = parseFloat(match[1]);
				const prefix = match[2]; // 保留原始大小写

				if (isNaN(numValue)) return 0;

				// 根据单位和前缀转换到基本单位
				if (unit === 'Ω' || unit === '') {
					// 电阻：转换到 Ω
					switch (prefix) {
						case 'm':
							return numValue * 0.001; // mΩ -> Ω
						case 'k':
							return numValue * 1000; // kΩ -> Ω
						case 'M':
							return numValue * 1000000; // MΩ -> Ω
						default:
							return numValue; // Ω
					}
				} else if (unit === 'F' || unit === '') {
					// 电容：转换到 F
					switch (prefix) {
						case 'p':
							return numValue * 1e-12; // pF -> F
						case 'n':
							return numValue * 1e-9; // nF -> F
						case 'μ':
							return numValue * 1e-6; // μF -> F
						case 'u':
							return numValue * 1e-6; // uF -> F (兼容)
						case 'm':
							return numValue * 1e-3; // mF -> F
						default:
							return numValue; // F
					}
				}

				return numValue;
			}

			// 获取单位优先级（电阻）
			function getResistorUnitPriority(unit) {
				const priorityMap = {
					'mΩ': 1,
					'Ω': 2,
					'kΩ': 3,
					'MΩ': 4,
				};
				return priorityMap[unit] || 999;
			}

			// 获取单位优先级（电容）
			function getCapacitorUnitPriority(unit) {
				const priorityMap = {
					'pF': 1,
					'nF': 2,
					'μF': 3,
					'uF': 3, // 兼容 uF
					'mF': 4,
					'F': 5,
				};
				return priorityMap[unit] || 999;
			}

			// 排序值列表（根据器件类型）
			function sortValues(values, typeCode) {
				return values.sort((a, b) => {
					if (typeCode === 'resistor') {
						// 电阻排序：先按单位优先级，再按数值大小
						const aUnit = a.unit || 'Ω';
						const bUnit = b.unit || 'Ω';
						const aPriority = getResistorUnitPriority(aUnit);
						const bPriority = getResistorUnitPriority(bUnit);

						if (aPriority !== bPriority) {
							return aPriority - bPriority;
						}

						// 同一单位内按数值大小排序
						const aBaseValue = convertToBaseUnit(a.value, aUnit);
						const bBaseValue = convertToBaseUnit(b.value, bUnit);
						console.log(`排序比较: ${a.value}${aUnit}=${aBaseValue} vs ${b.value}${bUnit}=${bBaseValue}`);
						return aBaseValue - bBaseValue;
					} else if (typeCode === 'capacitor') {
						// 电容排序：先按单位优先级，再按数值大小
						const aUnit = a.unit || 'F';
						const bUnit = b.unit || 'F';
						const aPriority = getCapacitorUnitPriority(aUnit);
						const bPriority = getCapacitorUnitPriority(bUnit);

						if (aPriority !== bPriority) {
							return aPriority - bPriority;
						}

						// 同一单位内按数值大小排序
						const aBaseValue = convertToBaseUnit(a.value, aUnit);
						const bBaseValue = convertToBaseUnit(b.value, bUnit);
						console.log(`排序比较: ${a.value}${aUnit}=${aBaseValue} vs ${b.value}${bUnit}=${bBaseValue}`);
						return aBaseValue - bBaseValue;
					}
					return 0;
				});
			}

			// 根据 ID 获取元件信息
			function getComponentById(id) {
				return new Promise((resolve, reject) => {
					if (!db) {
						reject(new Error('数据库未连接'));
						return;
					}
					const tx = db.transaction(STORE_NAME, 'readonly');
					const store = tx.objectStore(STORE_NAME);
					const request = store.get(parseInt(id));
					request.onsuccess = () => resolve(request.result);
					request.onerror = () => reject(request.error);
				});
			}

				clearHighlights(valueListEl);
				target.classList.add('selected');
				selectedValueId = newValueId;

				// 执行最终搜索
				checkAndSearch();
			});

			// 初始化
			async function init() {
				selectedTypeId = null;
				selectedTypeCode = '';
				selectedPkgId = null;
				selectedValueId = null;

				// 加载器件类型
				await initComponentTypes();
				// 加载封装列表
				await loadPackages();
				// 清空值列表
				await loadValues();
				// 显示初始提示
				clearResultsWithMessage('请选择器件类型、封装和参数值');
			}

			init();
		</script>
	</body>
</html>
